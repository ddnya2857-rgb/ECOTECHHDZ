<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <title>لوحة تحكم EcoTechDZ</title>
    <style>
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h2>قائمة المستخدمين المسجلين</h2>
    <table id="usersTable">
        <thead>
            <tr>
                <th>الاسم</th>
                <th>نوع المستخدم</th>
                <th>الموقع (الإحداثيات)</th>
                <th>كمية النفايات (كغ)</th>
            </tr>
        </thead>
        <tbody id="usersBody"></tbody>
    </table>

    <script>
        // جلب البيانات من السيرفر
        fetch('/get-users')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('usersBody');
                data.forEach(user => {
                    const row = `<tr>
                        <td>${user.fullName}</td>
                        <td>${user.userType}</td>
                        <td>${user.location ? user.location.lat.toFixed(4) + ', ' + user.location.lng.toFixed(4) : 'غير محدد'}</td>
                        <td>0</td> <!-- لاحقاً سنربط هذا بحسابات النفايات -->
                    </tr>`;
                    tbody.innerHTML += row;
                });
            });
    </script>
</body>
</html>
