<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <title>لوحة تحكم EcoTechDZ</title>
    <style>
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h2>قائمة المستخدمين المسجلين</h2>
    <table id="usersTable">
        <thead>
            <tr>
                <th>الاسم</th>
                <th>نوع المستخدم</th>
                <th>الموقع (الإحداثيات)</th>
                <th>كمية النفايات (كغ)</th>
            </tr>
        </thead>
        <tbody id="usersBody"></tbody>
    </table>

    <script>
    // جلب البيانات من السيرفر
    fetch('/get-users')
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = ''; // تفريغ الجدول قبل التعبئة

            // هذه هي حلقة foreach التي تبحثين عنها
           data.forEach(user => {
    // التأكد من وجود إحداثيات الموقع
    const locText = user.location ? `${user.location.lat.toFixed(4)}, ${user.location.lng.toFixed(4)}` : 'غير محدد';
   
    // بناء الصف (Row) داخل الجدول
    const row = `<tr>
        <td>${user.fullName}</td>
        <td>${user.userType}</td>
        <td>${locText}</td>
        <td>${user.wasteQuantity || 0} كغ</td>
    </tr>`;
   
    // إضافة الصف إلى جسم الجدول
    tbody.innerHTML += row;
});  
</script> 
</body>
</html>
