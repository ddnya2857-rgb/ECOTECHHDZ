<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل في EcoTechDZ</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; }
        form { background: #fff; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<form id="signupForm">
    <input type="number" id="wasteQuantity" placeholder="كمية النفايات (بالكيلوغرام)" required> 
    <h2>إنشاء حساب جديد</h2>
    <input type="text" id="fullName" placeholder="الاسم الكامل" required>
    <input type="email" id="email" placeholder="البريد الإلكتروني" required>
    <input type="password" id="password" placeholder="كلمة المرور" required>
   
    <label for="userType">نوع المستخدم:</label>
    <select id="userType" required>
        <option value="individual">فرد</option>
        <option value="public_institution">مؤسسة عمومية</option>
        <option value="private_company">مؤسسة خاصة</option>
        <option value="recycling_center">مركز إعادة تدوير</option>
        <option value="workshop">ورشة صناعية</option>
        <option value="transport_truck">شاحنة نقل</option>
        <option value="waste_collector">جامع نفايات</option>
    </select>
   
    <button type="submit">التسجيل والتحقق</button>
</form>

<script>
    // دالة الحصول على الموقع
    function getUserLocation(callback) {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                callback({
                    lat: position.coords.latitude,
                    lng: position.coords.longitude
                });
            }, (error) => {
                alert("يرجى تفعيل الموقع لتسهيل عمليات النقل.");
                callback(null);
            });
        } else {
            alert("متصفحك لا يدعم نظام تحديد المواقع.");
            callback(null);
        }
    }

    // عملية التسجيل
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();

        getUserLocation((location) => {
           const userData = {
    fullName: document.getElementById('fullName').value,
    email: document.getElementById('email').value,
    password: document.getElementById('password').value,
    userType: document.getElementById('userType').value,
    wasteQuantity: document.getElementById('wasteQuantity').value, // إضافة الكمية
    location: location
};  

            fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            })
            .then(res => res.text())
            .then(data => {
                alert("تم التسجيل بنجاح!");
            })
            .catch(err => console.error("خطأ:", err));
        });
    });
</script>

</body>
</html>
