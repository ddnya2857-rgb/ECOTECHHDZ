<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل حساب - EcoTechDZ</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; }
        .nav { background: #287456; padding: 15px; color: white; text-align: center; }
        .nav a { color: white; margin: 0 10px; text-decoration: none; }
        .container { max-width: 400px; margin: 50px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #287456; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<link rel="stylesheet" href="style.css">
<body>

    <!-- شريط التنقل -->
    <nav class="nav">
        <a href="index.html">الرئيسية</a>
        <a href="dashboard.html">لوحة التحكم</a>
        <a href="signup.html">التسجيل</a>
        <a href="verify.html">التحقق</a>
    </nav>

    <!-- نموذج التسجيل -->
    <div class="container">
        <h2>إنشاء حساب EcoTechDZ</h2>
        <form id="signupForm">
            <input type="text" id="fullName" placeholder="الاسم الكامل" required>
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <button type="submit">التسجيل والتحقق</button>
        </form>
    </div>

    <!-- كود إرسال البيانات -->
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                if (response.ok) {
                    alert('تم التسجيل بنجاح! سيتم توجيهك لصفحة التحقق.');
                    window.location.href = 'verify.html';
                } else {
                    alert('حدث خطأ في التسجيل.');
                }
            } catch (err) {
                console.error('Error:', err);
                alert('تأكدي من تشغيل السيرفر (server.js)');
            }
        });
    </script>
</body>
</html>
