<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>التسجيل - EcoTechDZ</title></head>
<body>
<nav style="background: #287456; padding: 15px; color: white; text-align: center; margin-bottom: 20px;">
    <a href="signup.html" style="color: white; margin: 0 10px; text-decoration: none;">التسجيل</a>
    <a href="verify.html" style="color: white; margin: 0 10px; text-decoration: none;">التحقق</a>
    <a href="index.html" style="color: white; margin: 0 10px; text-decoration: none;">الرئيسية</a>
    <a href="dashboard.html" style="color: white; margin: 0 10px; text-decoration: none;">لوحة التحكم</a>
    <a id="admin-link" href="admin_dashboard.html" style="color: #ffcccc; margin: 0 10px; text-decoration: none; font-weight: bold; display: none;">قائمة المستخدمين</a>
</nav>
<form id="signupForm" style="max-width: 400px; margin: auto;">
    <h2>إنشاء حساب جديد</h2>
    <input type="text" id="fullName" placeholder="الاسم الكامل" required style="width: 100%; margin: 5px 0;">
    <select id="userType" style="width: 100%; margin: 5px 0;">
        <option value="individual">فرد</option>
        <option value="public_org">مؤسسة عمومية</option>
        <option value="private_org">مؤسسة خاصة</option>
        <option value="workshop">ورشة صناعية</option>
        <option value="transporter">شاحنة ناقل</option>
        <option value="collector">جامع نفايات</option>
    </select>
    <input type="email" id="email" placeholder="البريد الإلكتروني" required style="width: 100%; margin: 5px 0;">
    <button type="button" onclick="sendOTP()">إرسال كود التحقق</button>
</form>
<script>
    if(localStorage.getItem("userEmail") === "ddnya2857@gmail.com") document.getElementById("admin-link").style.display = "inline";
    function sendOTP() { alert("تم إرسال الكود إلى " + document.getElementById('email').value); window.location.href="verify.html"; }
</script>
</body>
</html>
