<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل EcoTechDZ</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; }
        form { background: #fff; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<form id="signupForm">
    <h2>إنشاء حساب جديد</h2>
    <input type="text" id="fullName" placeholder="الاسم الكامل" required>
    <input type="email" id="email" placeholder="البريد الإلكتروني" required>
    <input type="password" id="password" placeholder="كلمة المرور" required>
    <button type="button" id="sendBtn" onclick="sendOTP()">إرسال كود التحقق</button>
</form>

<script type="text/javascript">
    emailjs.init("DrsQFDKtRE2nbijaO");

    function sendOTP() {
        const userEmail = document.getElementById('email').value;
        if (!userEmail) { alert("يرجى إدخال البريد الإلكتروني"); return; }
        
        const generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
        localStorage.setItem("myGeneratedOTP", generatedOTP);
        
        document.getElementById('sendBtn').innerText = "جاري الإرسال...";
        
        emailjs.send("service_me5o2lp", "template_f2zzbb6", {
            email: userEmail,
            passcode: generatedOTP
        }).then(() => {
            alert("تم إرسال الكود! سيتم تحويلك لصفحة التحقق.");
            window.location.href = "verify.html";
        }, (err) => {
            alert("فشل الإرسال: " + JSON.stringify(err));
            document.getElementById('sendBtn').innerText = "إرسال كود التحقق";
        });
    }
</script>

</body>
</html>
