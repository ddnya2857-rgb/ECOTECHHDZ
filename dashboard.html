<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - EcoTechDZ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        button { background: #006233; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
    </style>
</head>
<body>
    <!-- شريط التنقل المرتب حسب طلبك -->
    <nav style="background: #287456; padding: 15px; color: white; text-align: center; margin-bottom: 20px;">
        <a href="signup.html" style="color: white; margin: 0 10px; text-decoration: none;">التسجيل</a>
        <a href="verify.html" style="color: white; margin: 0 10px; text-decoration: none;">التحقق</a>
        <a href="index.html" style="color: white; margin: 0 10px; text-decoration: none;">الرئيسية</a>
        <a href="dashboard.html" style="color: white; margin: 0 10px; text-decoration: none;">لوحة التحكم</a>
        <a id="admin-link" href="admin_dashboard.html" style="color: #ffcccc; margin: 0 10px; text-decoration: none; font-weight: bold; display: none;">قائمة المستخدمين</a>
    </nav>

    <div class="card">
        <h3>لوحة تحكم المستخدم</h3>
        <p>مرحباً بك في منصة EcoTechDZ لتدوير النفايات في سكيكدة.</p>
        
        <div style="font-size: 24px; color: #006233; font-weight: bold;">
            رصيدك البيئي: <span id="user-points">0</span> نقطة
        </div>
    </div>

    <div class="card">
        <h3>سجل العمليات</h3>
        <table>
            <thead><tr><th>النوع</th><th>الوزن (كغ)</th><th>النقاط</th><th>التاريخ</th></tr></thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>

    <script>
        // إظهار رابط الإدارة لكِ فقط
        if(localStorage.getItem("userEmail") === "ddnya2857@gmail.com") {
            document.getElementById("admin-link").style.display = "inline";
        }
        
        // منطق عرض النقاط (يمكنك ربطه بالبيانات الفعلية لاحقاً)
        document.getElementById("user-points").innerText = localStorage.getItem("totalPoints") || 0;
    </script>
</body>
</html>
