<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>EcoTechDZ - لوحة التحكم</title>
    <style>
        :root { --green: #006233; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; }
        th { background-color: #f8f9fa; color: var(--green); }
    </style>
</head>
<body>

    <nav style="background: #287456; padding: 15px; color: white; text-align: center; border-radius: 10px;">
        <a href="index.html" style="color: white; margin: 0 10px;">الرئيسية</a>
        <a href="dashboard.html" style="color: white; margin: 0 10px;">لوحة التحكم</a>
    </nav>

    <div class="card">
        <h3>رصيدك البيئي التراكمي</h3>
        <div id="user-points" style="font-size: 40px; color: var(--green); font-weight: bold;">0</div>
        <p>نقطة مكتسبة (للأفراد عند عمليات البيع فقط)</p>
    </div>

    <div class="card">
        <h3>سجل العمليات الشامل</h3>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>النوع</th>
                    <th>نوع المستخدم</th>
                    <th>نوع العملية</th>
                    <th>الوزن (كغ)</th>
                    <th>النقاط</th>
                    <th>التاريخ</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>

    <script>
        function loadOperations() {
            // سحب كافة العمليات من التخزين المحلي
            const history = JSON.parse(localStorage.getItem('allOperations') || "[]");
            const tbody = document.getElementById('historyBody');
            let totalPoints = 0;
           
            tbody.innerHTML = "";
           
            history.forEach(item => {
                let row = tbody.insertRow();
               
                // تنظيف البيانات
                let userType = (item.userType || "").trim();
                let actionType = (item.actionType || "").trim();
                let points = parseFloat(item.points || 0);

                // منطق احتساب النقاط: فرد + بيع فقط
                let pointsForThisRow = 0;
                if (userType === "فرد" && actionType === "بيع") {
                    pointsForThisRow = points;
                }
               
                totalPoints += pointsForThisRow;

                // عرض البيانات كما هي مخزنة في الـ localStorage
                row.innerHTML = `
                    <td>${item.type || '-'}</td>
                    <td>${userType || '-'}</td>
                    <td>${actionType || '-'}</td>
                    <td>${item.weight || 0}</td>
                    <td>${pointsForThisRow}</td>
                    <td>${item.date || '-'}</td>
                `;
            });
           
            // عرض الإجمالي
            document.getElementById('user-points').innerText = totalPoints;
        }

        loadOperations();
    </script>
</body>
</html>
