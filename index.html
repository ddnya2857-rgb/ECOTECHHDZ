<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>EcoTechDZ - منصة الاقتصاد الدائري</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f4f4; }
        header { background: #287456; color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .box { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #4CAF50; color: white; padding: 10px; border: none; cursor: pointer; width: 100%; border-radius: 5px; margin-top: 5px; }
        #webcam { width: 100%; max-width: 300px; display: block; margin: 10px auto; background: #000; }
        input, select { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .price-tag { font-weight: bold; color: #287456; font-size: 1.2em; }
    </style>
</head>
<body>

<nav style="background: #287456; padding: 15px; color: white; text-align: center;">
    <a href="index.html" style="color: white; margin: 0 10px; text-decoration: none;">الرئيسية</a>
    <a href="dashboard.html" style="color: white; margin: 0 10px; text-decoration: none;">لوحة التحكم</a>
</nav>

<div class="box">
    <h3>الكاميرا الذكية للتصنيف والتقدير</h3>
    <video id="webcam" autoplay playsinline></video>
    <button onclick="startCamera()">تشغيل الكاميرا</button>
    <button onclick="classifyWaste()" style="background:#2196F3">تصنيف النفايات</button>
    <p id="result">النتيجة: بانتظار التصنيف...</p>
</div>

<div class="box">
    <h3>سوق بيع وشراء النفايات</h3>
    <label>نوع النفايات:</label>
    <input type="text" id="wasteType" readonly>
    <label>الوزن (كغ):</label>
    <input type="number" id="weight" placeholder="0" oninput="calculatePrice()">
    <p class="price-tag" id="totalPrice">السعر المتوقع: 0 دج</p>
    <button onclick="saveData()">نشر في السوق</button>
</div>

<script>
    // جدول الأسعار المرجعي (دج/كغ)
    const priceList = {
        "plastic": 30,
        "paper": 10,
        "metal": 120,
        "glass": 5,
        "default": 20
    };

    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('webcam').srcObject = stream;
    }

    async function classifyWaste() {
        const video = document.getElementById('webcam');
        const model = await mobilenet.load();
        const preds = await model.classify(video);
        const type = preds[0].className.toLowerCase();
       
        document.getElementById('result').innerText = "تم التصنيف كـ: " + type;
        document.getElementById('wasteType').value = type;
        calculatePrice();
    }

    function calculatePrice() {
        const weight = document.getElementById('weight').value;
        const type = document.getElementById('wasteType').value.toLowerCase();
       
        // تحديد السعر بناءً على النوع المكتشف
        let pricePerKg = priceList.default;
        if (type.includes('bottle')) pricePerKg = priceList.plastic;
        else if (type.includes('paper')) pricePerKg = priceList.paper;
        else if (type.includes('metal')) pricePerKg = priceList.metal;
       
        const total = weight * pricePerKg;
        document.getElementById('totalPrice').innerText = "السعر المتوقع: " + total + " دج";
    }

    function saveData() {
        alert("تم نشر العرض في سوق سكيكدة بنجاح!");
    }
</script>

</body>
</html>
