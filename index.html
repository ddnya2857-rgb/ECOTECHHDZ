<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الرئيسية - EcoTechDZ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; padding: 20px; }
        .nav-bar { background: #287456; padding: 15px; color: white; text-align: center; border-radius: 5px; margin-bottom: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #28a745; color: white; padding: 12px; border: none; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>
    <!-- الربط التسلسلي (شريط التنقل) -->
    <nav class="nav-bar">
        <a href="signup.html" style="color: white; margin: 0 5px;">التسجيل</a>
        <a href="verify.html" style="color: white; margin: 0 5px;">التحقق</a>
        <a href="index.html" style="color: white; margin: 0 5px;">الرئيسية</a>
        <a href="dashboard.html" style="color: white; margin: 0 5px;">لوحة التحكم</a>
        <a id="admin-link" href="admin_dashboard.html" style="color: #ffcccc; margin: 0 5px; font-weight: bold; display: none;">قائمة المستخدمين</a>
    </nav>

    <div style="text-align: center;">
        <h1>الاقتصاد الدائري - سكيكدة</h1>
        <h3>نحو جزائر خضراء</h3>
    </div>

    <div class="box">
        <h3>الكاميرا الذكية: تصنيف ووزن</h3>
        <video id="webcam" width="100%" autoplay playsinline style="background:#000;"></video>
        <button onclick="startCamera()">تشغيل الكاميرا</button>
        <button onclick="classifyWaste()" style="background:#007bff;">بدء التصنيف التلقائي</button>
    </div>

    <div class="box">
        <h3>بيانات العملية والربط</h3>
        <input type="text" id="wasteType" placeholder="نوع النفايات (بلاستيك/معادن/ورق/زجاج)">
        <input type="text" id="weight" placeholder="الوزن (كغ)">
        <input type="text" id="price" placeholder="المبلغ (دج)">
        <select id="actionType"><option>بيع</option><option>شراء</option></select>
        <select id="paymentMethod"><option>عند التسليم</option><option>البطاقة الذهبية</option><option>بريدي موب</option></select>
        <input type="text" id="userType" placeholder="نوع المستخدم (فرد/مؤسسة/ورشة/ناقل)">
        <input type="text" id="location" value="سكيكدة" placeholder="الموقع">
        <button onclick="getLocation()" style="background:#6c757d;">تفعيل GPS للربط مع المستخدمين</button>
        <button onclick="submitTransaction()" style="background:#dc3545; margin-top: 10px;">تأكيد العملية</button>
    </div>

    <script>
        if(localStorage.getItem("userEmail") === "ddnya2857@gmail.com") document.getElementById("admin-link").style.display = "inline";

        async function startCamera() {
            const video = document.getElementById('webcam');
            video.srcObject = await navigator.mediaDevices.getUserMedia({ video: true });
        }

        function classifyWaste() {
            document.getElementById('wasteType').value = "بلاستيك";
            document.getElementById('weight').value = "0.5";
            document.getElementById('price').value = "15";
            alert("تم رصد النفايات وتحديد الوزن!");
        }

        function getLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                alert("تم تحديد موقعك في سكيكدة والربط مع أقرب المشترين/البائعين.");
            });
        }

        function submitTransaction() { alert("تم تسجيل العملية في منصة الاقتصاد الدائري بنجاح!"); }
    </script>
</body>
</html>
