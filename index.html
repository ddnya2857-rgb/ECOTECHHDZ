<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة الاقتصاد الدائري - EcoTechDZ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f4f4; }
        .box { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #4CAF50; color: white; padding: 10px; border: none; cursor: pointer; width: 100%; border-radius: 5px; margin-top: 5px; }
        video { width: 100%; max-width: 300px; display: block; margin: 10px auto; background: #000; }
        input, select { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table, th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <h3>الكاميرا الذكية للتصنيف</h3>
    <video id="webcam" autoplay playsinline></video>
    <button onclick="startCamera()">تشغيل الكاميرا</button>
    <button onclick="classifyWaste()" style="background:#2196F3">تصنيف النفايات</button>
    <p id="result">النتيجة: بانتظار التصنيف...</p>
</div>

<div class="box">
    <h3>جدول الأسعار المرجعي (دج / كغ)</h3>
    <table>
        <tr><th>المادة</th><th>السعر</th></tr>
        <tr><td>بلاستيك</td><td>30</td></tr>
        <tr><td>كرتون</td><td>10</td></tr>
        <tr><td>معادن</td><td>120</td></tr>
    </table>
</div>

<div class="box">
    <h3>سوق بيع وشراء النفايات</h3>
    <label>: العملية</label>
    <select id="opType">
        <option value="sell">بيع</option>
        <option value="buy">شراء</option>
    </select>
    <label>: نوع النفايات</label>
    <input type="text" id="wasteType" readonly>
    <label>:(الوزن (كغ</label>
    <input type="number" id="weight" placeholder="الوزن" oninput="calculatePrice()">
    <p id="totalPrice" style="font-weight:bold;">السعر المتوقع: 0 دج</p>
    <button onclick="saveData()">نشر في السوق</button>
</div>

<!-- زر التنقل للوحة التحكم -->
<div class="box">
    <button style="background-color: #FF9800;" onclick="window.location.href='dashboard.html'">
        الذهاب إلى لوحة التحكم
    </button>
</div>

<script>
    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('webcam').srcObject = stream;
    }

    async function classifyWaste() {
        const video = document.getElementById('webcam');
        const model = await mobilenet.load();
        const preds = await model.classify(video);
        const type = preds[0].className;
        document.getElementById('wasteType').value = type;
        document.getElementById('result').innerText = "تم التصنيف كـ: " + type;
       
        let weight = 0;
        if (type.includes('plastic') || type.includes('bottle')) weight = 0.5;
        else if (type.includes('paper')) weight = 0.2;
        else if (type.includes('metal')) weight = 1.5;
        else weight = 1.0;
       
        document.getElementById('weight').value = weight;
        calculatePrice();
    }

    function calculatePrice() {
        const weight = document.getElementById('weight').value;
        const type = document.getElementById('wasteType').value.toLowerCase();
        let pricePerKg = 20;
        if (type.includes('plastic') || type.includes('bottle')) pricePerKg = 30;
        else if (type.includes('paper')) pricePerKg = 10;
        else if (type.includes('metal')) pricePerKg = 120;
        const total = (weight * pricePerKg).toFixed(2);
        document.getElementById('totalPrice').innerText = "السعر المتوقع: " + total + " دج";
    }

    function saveData() {
        alert("تم نشر الطلب في سوق سكيكدة بنجاح!");
    }
</script>

</body>
</html>
