<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التحقق - EcoTechDZ</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; }
        .container { background: #fff; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <!-- شريط التنقل الموحد -->
    <nav style="background: #287456; padding: 15px; color: white; text-align: center; margin-bottom: 20px;">
        <a href="signup.html" style="color: white; margin: 0 10px; text-decoration: none;">التسجيل</a>
        <a href="verify.html" style="color: white; margin: 0 10px; text-decoration: none;">التحقق</a>
        <a href="index.html" style="color: white; margin: 0 10px; text-decoration: none;">الرئيسية</a>
        <a href="dashboard.html" style="color: white; margin: 0 10px; text-decoration: none;">لوحة التحكم</a>
        <a id="admin-link" href="admin_dashboard.html" style="color: #ffcccc; margin: 0 10px; text-decoration: none; font-weight: bold; display: none;">قائمة المستخدمين</a>
    </nav>
    <script>
        if(localStorage.getItem("userEmail") === "ddnya2857@gmail.com") { document.getElementById("admin-link").style.display = "inline"; }
    </script>

    <div class="container">
        <h2>أدخل كود التحقق</h2>
        <input type="text" id="otpInput" placeholder="أدخل الكود المكون من 6 أرقام">
        <button onclick="verifyCode()">تأكيد</button>
    </div>

    <script>
        function verifyCode() {
            const enteredOTP = document.getElementById('otpInput').value;
            const savedOTP = localStorage.getItem("myGeneratedOTP");
            if(enteredOTP === savedOTP) {
                alert("تم التحقق بنجاح!");
                localStorage.setItem("userEmail", "ddnya2857@gmail.com");
                window.location.href = "index.html";
            } else { alert("الكود غير صحيح"); }
        }
    </script>
</body>
</html>
