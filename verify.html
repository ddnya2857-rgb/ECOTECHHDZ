<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التحقق من EcoTechDZ</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border-top: 10px solid #006233; width: 350px; }
        .logo { font-size: 50px; margin-bottom: 10px; color: #006233; }
        h2 { color: #006233; }
        input { width: 80%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 5px; text-align: center; font-size: 18px; }
        button { background-color: #D21034; color: white; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #a80d29; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">♻️</div>
    <h2>EcoTechDZ</h2>
    <p>أدخل كود التحقق المرسل لبريدك الإلكتروني</p>
    <input type="text" id="code" placeholder="000000" maxlength="6">
    <button onclick="verify()">تأكيد التسجيل</button>
</div>

<script>
    function verify() {
        const code = document.getElementById('code').value;
        // هنا نختبر الكود (حالياً يقبل أي شيء بما أننا أوقفنا الإيميل الحقيقي)
        if(code === "123456") {
            alert("تم التحقق بنجاح! مرحباً بك في EcoTechDZ");
            window.location.href = "dashboard.html";
        } else {
            alert("الكود غير صحيح، يرجى المحاولة مجدداً.");
        }
    }
</script>

</body>
</html>
