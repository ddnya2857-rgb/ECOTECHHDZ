<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التحقق من الحساب - EcoTechDZ</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; background-color: #f4f4f4; text-align: center; }
        .container { background: #fff; padding: 30px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>التحقق من البريد الإلكتروني</h2>
    <p>لقد أرسلنا كود التحقق إلى بريدك، يرجى إدخاله أدناه:</p>
    <input type="text" id="otpCode" placeholder="أدخل الكود المكون من 6 أرقام" required>
    <button onclick="verifyAndRegister()">تأكيد التسجيل</button>
</div>

<script>
    function verifyAndRegister() {
        // استرجاع الكود الذي خزنّاه سابقاً من صفحة التسجيل
        const savedOTP = localStorage.getItem("myGeneratedOTP");
        const userOTP = document.getElementById('otpCode').value;

        if (userOTP === savedOTP) {
            alert("تم التحقق بنجاح! مرحباً بك في EcoTechDZ.");
            // مسح الكود من الذاكرة للأمان
            localStorage.removeItem("myGeneratedOTP");
            // الانتقال التلقائي إلى لوحة التحكم
            window.location.href = "index.html";
        } else {
            alert("عذراً، الكود غير صحيح. يرجى التأكد من الكود المرسل للإيميل.");
        }
    }
</script>

</body>
</html>
